<!DOCTYPE html>
<html>
<head>
<title>AgroSense Login</title>

<style>
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#e8f5e9,#f4f7f3);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  background:#1f6012;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:8px;
}

button:hover{
  background:#14440c;
}

#msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">

  <h2>🌱 AgroSense Login</h2>

  <select id="role" onchange="toggleFields()">
    <option value="farmer">Farmer</option>
    <option value="admin">Admin</option>
  </select>

  <input type="text" id="userId" placeholder="Farmer ID">
  <input type="email" id="email" placeholder="Admin Email" style="display:none;">
  
  <input type="password" id="password" placeholder="Password">
  <div style="text-align:center;font-size:12px;">
    <input type="checkbox" onclick="togglePass()"> Show Password
  </div>

  <button onclick="login()">Login</button>
  <p>
  New Farmer? 
  <a href="register.html">Register here</a>
</p>
  <p id="msg"></p>

</div>


<script src="./js/login.js">



</script>

</body>
</html>
